name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g., v0.4.5)"
        required: true
        type: string
        default: ""

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install types-PyYAML

      - name: Lint with ruff
        run: ruff check src tests

      - name: Format check with black
        run: black --check src tests

      - name: Type check with mypy
        run: mypy src

      - name: Test with pytest
        run: pytest -o addopts="" --cov=hermes_okf --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  validate-okf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
      - name: Init and validate example bundle
        run: |
          hermes-okf init examples/example_bundle
          hermes-okf --path examples/example_bundle validate

  publish:
    needs: [test, validate-okf]
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main'
       || github.event_name == 'workflow_dispatch')
      && needs.test.result == 'success'
      && needs.validate-okf.result == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -oP '__version__ = "\K[^"]+' src/hermes_okf/__init__.py)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"

      - name: Check if version already exists on PyPI
        id: check_version
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/hermes-okf/${{ steps.version.outputs.version }}/json")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Version ${{ steps.version.outputs.version }} already exists on PyPI. Skipping publish."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Version ${{ steps.version.outputs.version }} is new. Proceeding with publish."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install build tools
        if: steps.check_version.outputs.exists == 'false'
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        if: steps.check_version.outputs.exists == 'false'
        run: python -m build

      - name: Publish to PyPI
        if: steps.check_version.outputs.exists == 'false'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
